<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Rock, paper, scissors</title>
    <link rel="stylesheet" href="RPS_style.css">
    <script src="SPS.js"></script>
     <script src="RPS.js" defer></script>
  </head>

  <body>
    <div class="main">
    <h1 class="label">"Rock, paper, scissors" game</h1>
    <div class="controls">
    <h3 class="label">Select your object:</h3>
      <div class="objects">
     <button class="rock"><img alt="rock"></button> 
      <button class="rock"><img alt="paper"></button> 
      <button class="rock"><img alt="scissors"></button> 
      <button class="reset"><img alt="reset"></button> 
      </div>
      <p class="result">
        Game score:
      </p>
       </div>
    </div>
  </body>
</html>
