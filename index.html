<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Rock, paper, scissors</title>
    <link rel="stylesheet" href="RPS_style.css">
    <script src="SPS.js" defer></script>
  </head>

  <body>
    <div class="main">
      <h1 class="label">Rock, paper, scissors game
      </h1>
      <div class="controls">
      <h3 class="label">Select your object:</h3>
        <div class="objects">
         <button class="btn" id="rock"><img src="./images/rock.png" alt="rock"></button> 
          <button class="btn" id="paper"><img src="./images/paper.png" alt="paper"></button> 
          <button class="btn" id="scissors"><img src="./images/scissors.png" alt="scissors"></button> 
          <button class="btn" id="reset"><img src="./images/reset.png"alt="reset"></button> 
        </div>
          <div class="info">
               <p id="score">
                  Game score: user = 0, PC = 0.
               </p>
               <p id="result"></p>
               <p id="choices"></p>
           </div>
         </div>
    </div>
  </body>
</html>
